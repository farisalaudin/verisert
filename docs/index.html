<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VeriSert &mdash; Verifikasi Keaslian Sertifikat Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="shell header-inner">
      <div>
        <p class="eyebrow">Verifikasi Sertifikat Digital</p>
        <h1>VeriSert</h1>
      </div>
      <p class="header-copy">Sistem client-side untuk menyisipkan dan memverifikasi data sertifikat terenkripsi di dalam gambar PNG.</p>
      <div style="font-size: 0.85rem; color: #666; margin-top: 0.5rem;">
        <span id="stitch-status" style="padding: 0.25rem 0.5rem; border-radius: 3px; background: #f0f0f0;">🔄 Cek koneksi Stitch...</span>
      </div>
    </div>
  </header>

  <main class="shell app-main">
    <nav class="tabs" aria-label="Mode aplikasi">
      <button id="tab-btn-generate" data-tab="generate" class="tab-btn active" type="button">Buat Sertifikat</button>
      <button id="tab-btn-verify" data-tab="verify" class="tab-btn" type="button">Verifikasi Sertifikat</button>
    </nav>

    <section id="tab-generate" class="tab-section generate-layout" aria-labelledby="tab-btn-generate">
      <form id="form-generate" class="form-panel">
        <div class="form-grid">
          <div class="form-group">
            <label for="input-nama">Nama Penerima</label>
            <input type="text" id="input-nama" name="nama" required />
          </div>
          <div class="form-group">
            <label for="input-nim">NIM</label>
            <input type="text" id="input-nim" name="nim" required />
          </div>
          <div class="form-group span-2">
            <label for="input-program">Nama Program/Sertifikat</label>
            <input type="text" id="input-program" name="program" required />
          </div>
          <div class="form-group">
            <label for="input-no-sertifikat">Nomor Sertifikat</label>
            <input type="text" id="input-no-sertifikat" name="no_sertifikat" required />
          </div>
          <div class="form-group">
            <label for="input-tanggal-terbit">Tanggal Terbit</label>
            <input type="date" id="input-tanggal-terbit" name="tanggal_terbit" required />
          </div>
          <div class="form-group span-2">
            <label for="input-penerbit">Nama Instansi Penerbit</label>
            <input type="text" id="input-penerbit" name="penerbit" required />
          </div>
          <div class="form-group span-2">
            <label for="input-cover-image">Gambar Sertifikat</label>
            <label class="dropzone" for="input-cover-image">
              <span class="dropzone-icon" aria-hidden="true">PNG</span>
              <span>Letakkan gambar PNG di sini, atau klik untuk unggah</span>
              <input type="file" id="input-cover-image" name="cover_image" accept="image/png" required />
            </label>
          </div>
          <div class="form-group span-2">
            <label for="input-passphrase">Passphrase</label>
            <input type="password" id="input-passphrase" name="passphrase" required />
          </div>
        </div>
        <div id="capacity-info" aria-live="polite"></div>
        <button type="submit" id="btn-generate">Generate Sertifikat</button>
      </form>

      <aside class="preview-panel" aria-label="Pratinjau sertifikat">
        <div class="guilloche-divider" aria-hidden="true"></div>
        <div id="preview-area">
          <div class="preview-section empty-preview">
            <div class="preview-grid">
              <div class="preview-card">
                <p class="preview-label">Asli</p>
                <div class="preview-placeholder">Belum ada gambar</div>
              </div>
              <div class="preview-card">
                <p class="preview-label">Hasil Steganografi</p>
                <div class="preview-placeholder">Belum diproses</div>
              </div>
            </div>
            <button class="btn-download" type="button" disabled>Unduh Sertifikat (.png)</button>
          </div>
        </div>
      </aside>
    </section>

    <section id="tab-verify" class="tab-section verify-layout" hidden aria-labelledby="tab-btn-verify">
      <form id="form-verify" class="form-panel">
        <div class="form-group">
          <label for="input-verify-image">Gambar Sertifikat</label>
          <label class="dropzone" for="input-verify-image">
            <span class="dropzone-icon" aria-hidden="true">PNG</span>
            <span>Letakkan gambar PNG di sini, atau klik untuk unggah</span>
            <input type="file" id="input-verify-image" name="verify_image" accept="image/png" required />
          </label>
          <!-- Preview area for uploaded image -->
          <div id="verify-preview-area" aria-live="polite"></div>
        </div>
        <div class="form-group">
          <label for="input-verify-passphrase">Passphrase</label>
          <input type="password" id="input-verify-passphrase" name="passphrase" required />
        </div>
        <button type="submit" id="btn-verify">Verifikasi</button>
      </form>
      <div id="verify-result" aria-live="polite"></div>
    </section>
  </main>

  <!--
    Urutan load script kritis:
    1. CryptoJS CDN
    2. utils.js
    3. stego.js
    4. crypto.js
    5. stitch-client.js (MCP Stitch integration)
    6. app.js
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/stego.js"></script>
  <script src="js/crypto.js"></script>
  <script src="js/stitch-client.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
